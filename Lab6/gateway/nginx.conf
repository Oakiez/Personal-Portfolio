events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: Backend Services (PRIVATE) ─────────────────
    upstream service_a {
        server service-a:9000;
    }

    upstream service_b {
        server service-b:9001;
    }

    server {
        listen 80;
        server_name _;

        # ── Health Check ─────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","gateway":"api-gateway","lab":"LAB6"}';
            add_header Content-Type application/json;
        }

        # ── Route to Service A ───────────────────────────────
        location /api/service-a/ {
            proxy_pass http://service_a/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ── Route to Service B ───────────────────────────────
        location /api/service-b/ {
            proxy_pass http://service_b/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ── Block direct backend port access ─────────────────
        location / {
            return 403 '{"error":"Direct access not allowed. Use /api/service-a or /api/service-b"}';
            add_header Content-Type application/json;
        }
    }
}
